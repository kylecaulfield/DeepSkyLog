<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSkyLog &mdash; Session Planner</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">DeepSkyLog</span>
      </div>
      <nav class="site-nav">
        <a href="/" data-nav="home">Dashboard</a>
        <a href="/tonight.html" data-nav="tonight">Tonight</a>
        <a href="/planner.html" data-nav="planner">Planner</a>
        <a href="/gallery.html" data-nav="gallery">Gallery</a>
        <a href="/map.html" data-nav="map">Map</a>
      </nav>
    </header>
    <main>
      <h1 class="page-title">Session planner</h1>
      <p class="page-subtitle" id="subtitle">Pick a date and your location, see which unobserved targets clear your minimum altitude — and for how long.</p>

      <div class="toolbar">
        <label>
          Date
          <input id="date-input" type="date" />
        </label>
        <label>
          Latitude
          <input id="lat-input" type="number" step="0.0001" placeholder="51.4769" />
        </label>
        <label>
          Longitude
          <input id="lon-input" type="number" step="0.0001" placeholder="-0.0005" />
        </label>
        <label>
          Min altitude (°)
          <input id="alt-input" type="number" step="1" min="0" max="90" value="30" />
        </label>
        <label>
          <input id="include-observed" type="checkbox" /> Include observed
        </label>
        <button type="button" id="locate-btn">Use my location</button>
        <button type="button" id="run-btn">Plan</button>
        <span id="status" class="dim" style="margin-left:auto;"></span>
      </div>

      <div id="moon-line" class="dim" style="margin-bottom: 0.75rem;"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Object</th>
              <th>Name</th>
              <th>Type</th>
              <th>Constellation</th>
              <th>Mag</th>
              <th>Max alt</th>
              <th>At</th>
              <th>Above min for</th>
              <th>List</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
    <script type="module" src="/js/planner.js"></script>
    <script type="module" src="/js/site-name.js"></script>
  </body>
</html>
