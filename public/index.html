<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSkyLog &mdash; Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">DeepSkyLog</span>
      </div>
      <nav class="site-nav">
        <a href="/" data-nav="home">Dashboard</a>
        <a href="/tonight.html" data-nav="tonight">Tonight</a>
        <a href="/gallery.html" data-nav="gallery">Gallery</a>
        <a href="/map.html" data-nav="map">Map</a>
      </nav>
    </header>
    <main>
      <p class="stardate">
        <strong id="stardate">Stardate ——</strong>
        · Stellar Cartography Database · Federation Observatory Net
      </p>
      <h1 class="page-title">Catalog progress</h1>
      <p class="page-subtitle">
        Your deep-sky observing lists at a glance. ·
        <a href="https://github.com/kylecaulfield/DeepSkyLog"
           target="_blank" rel="noopener noreferrer">View on GitHub</a>
      </p>
      <section class="section">
        <div id="list-cards" class="card-grid">
          <p class="muted">Loading catalogs&hellip;</p>
        </div>
      </section>
      <section class="section">
        <h2>Recent observations</h2>
        <div id="recent" class="gallery">
          <p class="muted">Loading observations&hellip;</p>
        </div>
      </section>
    </main>
    <script type="module" src="/js/dashboard.js"></script>
  </body>
</html>
