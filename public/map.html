<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSkyLog &mdash; Map</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />
    <style>
      #map {
        height: calc(100vh - 170px);
        min-height: 420px;
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #020510;
      }
      .leaflet-popup-content-wrapper {
        background: #0c1024;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .leaflet-popup-tip { background: #0c1024; }
      .leaflet-popup-content { margin: 0.65rem 0.8rem; font-size: 0.9rem; }
      .pin-popup img {
        display: block; width: 160px; height: 110px;
        object-fit: cover; border-radius: 6px; margin-bottom: 0.4rem;
      }
      .pin-popup small { color: var(--fg-dim); }
      .pin-popup h4 { margin: 0 0 0.2rem; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">DeepSkyLog</span>
      </div>
      <nav class="site-nav">
        <a href="/" data-nav="home">Dashboard</a>
        <a href="/gallery.html" data-nav="gallery">Gallery</a>
        <a href="/map.html" data-nav="map">Map</a>
      </nav>
    </header>
    <main>
      <h1 class="page-title">Imaging locations</h1>
      <p class="page-subtitle" id="count-line">Loading&hellip;</p>
      <div id="map" role="region" aria-label="Observation locations"></div>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script type="module" src="/js/map.js"></script>
  </body>
</html>
