<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSkyLog &mdash; Upload</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">DeepSkyLog · Admin</span>
      </div>
      <nav class="site-nav">
        <a href="/">Public site</a>
        <a href="/admin/">Dashboard</a>
        <a href="/admin/upload.html" class="active">Upload</a>
      </nav>
    </header>
    <main>
      <h1 class="page-title">Log an observation</h1>
      <p class="page-subtitle">Drop an image to auto-fill metadata, then confirm the details.</p>

      <section class="section">
        <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload image">
          <input id="file-input" type="file" accept="image/*" hidden />
          <div class="dropzone-inner">
            <div class="dropzone-icon" aria-hidden="true">◎</div>
            <p><strong>Drag &amp; drop</strong> an image here</p>
            <p class="dim">or <button type="button" id="browse-btn" class="linkish">browse your files</button></p>
          </div>
          <div id="drop-progress" class="progress" hidden><span></span></div>
        </div>
      </section>

      <section id="form-section" class="section" hidden>
        <div class="form-grid">
          <div class="preview-col">
            <div class="preview-frame">
              <img id="preview-img" alt="Preview" />
            </div>
            <dl class="meta-list" id="exif-summary"></dl>
          </div>

          <form id="observation-form" class="form-col" autocomplete="off">
            <input type="hidden" name="stage_id" id="stage-id" />
            <input type="hidden" name="object_id" id="object-id" />

            <label class="field">
              <span>Object</span>
              <input id="object-input" list="object-suggestions"
                     placeholder="Start typing: M31, Orion Nebula, Andromeda…" required />
              <datalist id="object-suggestions"></datalist>
              <small id="object-hint" class="dim"></small>
            </label>

            <div class="row">
              <label class="field">
                <span>Catalog ID</span>
                <input id="catalog-input" name="catalog" placeholder="M" />
              </label>
              <label class="field">
                <span>Catalog #</span>
                <input id="catalog-number-input" name="catalog_number" placeholder="42" />
              </label>
            </div>

            <label class="field">
              <span>Title (optional)</span>
              <input name="title" id="title-input" placeholder="Clear winter night over the garden" />
            </label>

            <div class="row">
              <label class="field">
                <span>Date captured</span>
                <input type="datetime-local" name="observed_at" id="date-input" required />
              </label>
              <label class="field">
                <span>Location</span>
                <input name="location" id="location-input" placeholder="Bortle 4 · Dartmoor, UK" />
              </label>
            </div>

            <label class="field">
              <span>Telescope</span>
              <select id="telescope-select" name="telescope" required>
                <option value="" disabled selected>Select a telescope…</option>
              </select>
              <small id="telescope-hint" class="dim"></small>
            </label>

            <label class="field">
              <span>Rating</span>
              <div class="rating" id="rating">
                <button type="button" data-value="1" aria-label="1 star">★</button>
                <button type="button" data-value="2" aria-label="2 stars">★</button>
                <button type="button" data-value="3" aria-label="3 stars">★</button>
                <button type="button" data-value="4" aria-label="4 stars">★</button>
                <button type="button" data-value="5" aria-label="5 stars">★</button>
                <input type="hidden" name="rating" id="rating-value" />
              </div>
            </label>

            <label class="field">
              <span>Notes</span>
              <textarea name="notes" id="notes-input" rows="4"
                        placeholder="Conditions, equipment settings, processing notes…"></textarea>
            </label>

            <div class="actions">
              <button type="button" id="cancel-btn" class="ghost">Discard</button>
              <button type="submit" id="save-btn">Save observation</button>
            </div>
            <p id="form-status" class="dim" role="status"></p>
          </form>
        </div>
      </section>
    </main>
    <script type="module" src="/admin/upload.js"></script>
  </body>
</html>
